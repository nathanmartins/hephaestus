# Dependabot configuration for automated dependency updates
# Generated by gh-update tool
version: 2

updates:
  # Pip dependency updates
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      pip-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - python

